<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <title>🐱 猫语翻译器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 顶部 -->
  <header>
    <span class="logo">🐱 猫语翻译器</span>
    <span class="stats" id="headerStats">今日 0 条 / 总计 0 条</span>
  </header>

  <main>
    <!-- 录音控制区 -->
    <section class="recorder">
      <button id="recordBtn" class="record-btn" type="button">
        <span class="icon">🎤</span>
        <span class="text">开始录音</span>
      </button>
      <div id="timer" class="timer hidden">00:00</div>
      <div id="recordingStatus" class="status"></div>
    </section>

    <!-- 最新结果 -->
    <section id="latestResult" class="result-card hidden">
      <h3>翻译结果</h3>
      <div class="translation"></div>
      <div class="meta"></div>
    </section>

    <!-- 历史记录 -->
    <section class="history">
      <h3>历史记录</h3>
      <div id="historyList" class="history-list"></div>
      <div id="emptyState" class="empty-state hidden">
        <p>🐱</p>
        <p>还没有录音，点击上方按钮开始录猫叫吧</p>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
