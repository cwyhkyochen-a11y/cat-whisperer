<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fafbfc">
  <title>猫语翻译器</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 顶部 -->
  <header>
    <span class="logo"><i data-lucide="cat"></i> 猫语翻译器</span>
    <div class="header-right">
      <span class="stats" id="headerStats">今日 0 条 / 总计 0 条</span>
      <button id="settingsBtn" class="settings-btn" title="设置" type="button">
        <i data-lucide="settings"></i>
      </button>
    </div>
  </header>

  <main>
    <!-- 录音控制区 -->
    <section class="recorder">
      <!-- 视频预览浮窗 -->
      <div id="videoPreview" class="video-preview hidden">
        <video id="previewVideo" autoplay muted playsinline></video>
        <div class="video-label">录像中</div>
      </div>
      <canvas id="frameCanvas" style="display:none"></canvas>

      <!-- 录像模式开关 -->
      <div class="recorder-options">
        <label class="mode-toggle">
          <input type="checkbox" id="videoModeToggle">
          <span class="mode-toggle-label"><i data-lucide="video"></i> 录像模式</span>
        </label>
      </div>

      <button id="recordBtn" class="record-btn" type="button">
        <i data-lucide="mic" class="icon"></i>
        <span class="text">开始录音</span>
      </button>
      <div id="timer" class="timer hidden">00:00</div>
      <div id="recordingStatus" class="status"></div>
      <!-- 波形 Canvas -->
      <canvas id="waveformCanvas" class="waveform-canvas hidden"></canvas>
    </section>

    <!-- 结果展示区 -->
    <div id="resultArea" class="result-area hidden">
      <!-- 频谱图 -->
      <div class="result-card">
        <div class="result-card-header">
          <i data-lucide="activity"></i>
          <span>频谱分析</span>
        </div>
        <div id="spectrogramContainer" class="spectrogram-container">
          <img id="spectrogramImg" class="spectrogram-img" alt="频谱图" />
        </div>
        <div id="featuresTags" class="features-tags"></div>
      </div>

      <!-- 视频帧 -->
      <div id="framesCard" class="result-card hidden">
        <div class="result-card-header">
          <i data-lucide="camera"></i>
          <span>截帧</span>
        </div>
        <div id="framesGallery" class="frames-gallery"></div>
      </div>

      <!-- AI 分析结果 -->
      <div class="result-card">
        <div class="result-card-header">
          <i data-lucide="message-circle"></i>
          <span>翻译结果</span>
        </div>
        <div id="translationText" class="translation-text"></div>
        <div id="behaviorTags" class="behavior-tags"></div>
        <div id="suggestionText" class="suggestion-text"></div>

        <!-- 标注确认 -->
        <div class="annotation-actions">
          <button id="confirmBtn" class="btn btn-secondary" type="button">
            <i data-lucide="check"></i> 确认标注
          </button>
          <button id="correctBtn" class="btn btn-secondary" type="button">
            <i data-lucide="edit-3"></i> 修正
          </button>
        </div>
      </div>
    </div>

    <!-- 最新结果 (旧版兼容) -->
    <section id="latestResult" class="result-card hidden">
      <h3><i data-lucide="message-circle"></i> 翻译结果</h3>
      <div class="translation"></div>
      <div class="meta"></div>
    </section>

    <!-- 历史记录 -->
    <section class="history">
      <h3><i data-lucide="clock"></i> 历史记录</h3>
      <div id="historyList" class="history-list"></div>
      <div id="emptyState" class="empty-state hidden">
        <i data-lucide="cat" class="empty-cat-icon"></i>
        <p>还没有录音，点击上方按钮开始录猫叫吧</p>
      </div>
    </section>
  </main>

  <!-- 设置遮罩 -->
  <div id="settingsOverlay" class="settings-overlay"></div>

  <!-- 设置面板 -->
  <div id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h3><i data-lucide="settings"></i> 设置</h3>
      <button id="closeSettingsBtn" class="close-settings-btn" type="button">
        <i data-lucide="x"></i>
      </button>
    </div>

    <div class="settings-group">
      <label class="settings-label">录音模式</label>
      <div class="radio-group" id="modeGroup">
        <label class="radio-option active" data-value="manual">
          <input type="radio" name="mode" value="manual" checked>
          <span class="radio-custom"></span>
          <span>手动</span>
        </label>
        <label class="radio-option" data-value="auto" id="autoModeOption">
          <input type="radio" name="mode" value="auto">
          <span class="radio-custom"></span>
          <span>自动（VAD）</span>
        </label>
      </div>
      <p class="settings-hint hidden" id="vadNotSupported">您的浏览器不支持自动模式</p>
    </div>

    <div class="settings-group">
      <label class="settings-label">VAD 灵敏度</label>
      <div class="slider-row">
        <input type="range" id="vadSensitivity" min="-50" max="-20" step="1" value="-35" class="settings-slider">
        <span class="slider-value" id="vadSensitivityLabel">中等</span>
      </div>
      <div class="slider-hints">
        <span>高灵敏</span>
        <span>低灵敏</span>
      </div>
    </div>

    <div class="settings-group">
      <label class="settings-label">自动停止安静时长</label>
      <div class="slider-row">
        <input type="range" id="silenceDuration" min="1" max="5" step="0.5" value="2" class="settings-slider">
        <span class="slider-value" id="silenceDurationLabel">2 秒</span>
      </div>
      <div class="slider-hints">
        <span>1 秒</span>
        <span>5 秒</span>
      </div>
    </div>

    <div class="settings-group">
      <label class="settings-label">最大录音时长</label>
      <select id="maxDuration" class="settings-select">
        <option value="60000">1 分钟</option>
        <option value="180000">3 分钟</option>
        <option value="300000" selected>5 分钟</option>
      </select>
    </div>

    <div class="settings-divider"></div>
    <div class="settings-group">
      <h4 class="settings-group-title"><i data-lucide="cpu"></i> AI 模型配置</h4>

      <div class="ai-status" id="aiStatus">
        <span class="status-dot"></span>
        <span class="status-text">检测中...</span>
      </div>

      <label class="settings-label">API 地址</label>
      <input type="url" id="aiApiBase" class="settings-input" placeholder="https://openrouter.ai/api/v1">

      <label class="settings-label">API Key</label>
      <div class="input-with-action">
        <input type="password" id="aiApiKey" class="settings-input" placeholder="sk-xxxx">
        <button id="toggleKeyVisibility" class="btn-icon-sm" type="button">
          <i data-lucide="eye"></i>
        </button>
      </div>
      <div class="input-hint" id="keyHint"></div>

      <label class="settings-label">模型</label>
      <input type="text" id="aiModel" class="settings-input" placeholder="google/gemini-2.0-flash-001">

      <div class="ai-actions">
        <button id="testAiBtn" class="btn btn-secondary" type="button">
          <i data-lucide="zap"></i> 测试连接
        </button>
        <button id="saveAiBtn" class="btn btn-primary" type="button">
          <i data-lucide="save"></i> 保存配置
        </button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="js/app.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
